services:
  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "3001:3000"
    environment:
      VITE_API_BASE_URL: http://localhost:18081
    volumes:
      - ./web:/app
    depends_on:
      - api

  api:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && node --watch src/server.mjs"
    ports:
      - "18081:8080"
    environment:
      API_DATA_SOURCE: postgres
      NODE_ENV: development
      PORT: 8080
      DATABASE_URL: postgresql://payment_app:payment_app@postgres:5432/payment_request
      REDIS_URL: redis://redis:6379
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: payment-request
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
    volumes:
      - ./api:/app
    depends_on:
      - postgres
      - redis
      - minio

  worker:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && node --watch src/worker.mjs"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://payment_app:payment_app@postgres:5432/payment_request
      REDIS_URL: redis://redis:6379
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: payment-request
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
    volumes:
      - ./worker:/app
    depends_on:
      - postgres
      - redis
      - minio

  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: payment_request
      POSTGRES_USER: payment_app
      POSTGRES_PASSWORD: payment_app
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
